<!DOCTYPE html>
<html>
<head>
  <title>Athlete Risk Predictor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
      font-size: 2.8rem;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      -webkit-background-clip: text;
      color: transparent;
    }

    .wrapper {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 14px;
      backdrop-filter: blur(12px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.08);
    }

    label {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    input:focus, select:focus {
      box-shadow: 0 0 10px #38bdf8;
    }

    button {
      display: block;
      margin: 40px auto;
      padding: 15px 40px;
      border-radius: 12px;
      border: none;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(34,197,94,0.6);
    }

    .result-card {
      text-align: center;
      margin: auto;
      width: 320px;
      padding: 25px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
    }

    .low { color: #22c55e; }
    .medium { color: #facc15; }
    .high { color: #ef4444; }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🏃 Athlete Risk Predictor</h1>

<div class="wrapper">

<div class="grid">

<div class="card"><label>Age</label><input id="age"></div>
<div class="card"><label>Weight</label><input id="weight_kg"></div>
<div class="card"><label>Body Fat %</label><input id="bf_percent"></div>

<div class="card"><label>Training Hours</label><input id="training_vol_hr_wk"></div>
<div class="card"><label>Sleep Hours</label><input id="sleep_h"></div>
<div class="card"><label>Testosterone</label><input id="testosterone_total"></div>

<div class="card"><label>Estradiol</label><input id="estradiol"></div>
<div class="card"><label>ALT</label><input id="ALT"></div>
<div class="card"><label>AST</label><input id="AST"></div>

<div class="card"><label>HDL</label><input id="HDL"></div>
<div class="card"><label>LDL</label><input id="LDL"></div>
<div class="card"><label>Hematocrit</label><input id="hematocrit"></div>

<div class="card"><label>Creatinine</label><input id="creatinine"></div>
<div class="card"><label>Mood</label><input id="mood_score"></div>
<div class="card"><label>Libido</label><input id="libido_score"></div>

<div class="card"><label>Enhancement Load</label><input id="enhancement_load"></div>

<div class="card">
<label>Sex</label>
<select id="sex">
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="card">
<label>Status</label>
<select id="status">
<option value="">Select</option>
<option value="off">Off</option>
<option value="on">On</option>
<option value="pct">PCT</option>
<option value="cruise">Cruise</option>
</select>
</div>

<div class="card">
<label>Goal</label>
<select id="goal">
<option value="">Select</option>
<option value="bulk">Bulk</option>
<option value="cut">Cut</option>
<option value="recomp">Recomp</option>
<option value="maintenance">Maintenance</option>
</select>
</div>

</div>

<button onclick="predict()">🚀 Analyze Risk</button>

<div class="result-card">
  <h2 id="result">Result will appear here</h2>
  <p id="confidence"></p>
  <p id="error" class="error"></p>
</div>

</div>

<script>
async function predict() {

  const data = {
    age: parseInt(age.value),
    weight_kg: parseFloat(weight_kg.value),
    bf_percent: parseFloat(bf_percent.value),
    training_vol_hr_wk: parseFloat(training_vol_hr_wk.value),
    sleep_h: parseFloat(sleep_h.value),
    testosterone_total: parseFloat(testosterone_total.value),
    estradiol: parseFloat(estradiol.value),
    ALT: parseFloat(ALT.value),
    AST: parseFloat(AST.value),
    HDL: parseFloat(HDL.value),
    LDL: parseFloat(LDL.value),
    hematocrit: parseFloat(hematocrit.value),
    creatinine: parseFloat(creatinine.value),
    mood_score: parseFloat(mood_score.value),
    libido_score: parseFloat(libido_score.value),
    enhancement_load: parseFloat(enhancement_load.value),
    sex: sex.value,
    status: status.value,
    goal: goal.value
  };

  error.innerText = "";

  for (let key in data) {
    if (data[key] === "" || isNaN(data[key]) && typeof data[key] === "number") {
      error.innerText = "⚠️ Fill all fields correctly";
      return;
    }
  }

  const res = await fetch(window.location.origin + "/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const out = await res.json();

  if (!res.ok) {
    console.log(out);
    error.innerText = "❌ Invalid input";
    return;
  }

  let color = "low";
  if (out.prediction.toLowerCase().includes("high")) color = "high";
  else if (out.prediction.toLowerCase().includes("medium")) color = "medium";

  result.innerHTML = `<span class="${color}">${out.prediction}</span>`;
  confidence.innerText =
    "Confidence: " + (out.confidence * 100).toFixed(2) + "%";
}
</script>

</body>
</html>
