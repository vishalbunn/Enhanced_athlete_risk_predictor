<!DOCTYPE html>
<html>
<head>
  <title>Athlete Risk Predictor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
      color: #38bdf8;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    input::placeholder {
      color: #cbd5f5;
    }

    button {
      margin: 20px;
      padding: 14px 30px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .card {
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .low { color: #22c55e; }
    .medium { color: #facc15; }
    .high { color: #ef4444; }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🏃 Athlete Risk Predictor</h1>

<div class="container">

<input id="age" placeholder="Age">
<input id="weight_kg" placeholder="Weight (kg)">
<input id="bf_percent" placeholder="Body Fat %">

<input id="training_vol_hr_wk" placeholder="Training Hours">
<input id="sleep_h" placeholder="Sleep Hours">
<input id="testosterone_total" placeholder="Testosterone">

<input id="estradiol" placeholder="Estradiol">
<input id="ALT" placeholder="ALT">
<input id="AST" placeholder="AST">

<input id="HDL" placeholder="HDL">
<input id="LDL" placeholder="LDL">
<input id="hematocrit" placeholder="Hematocrit">

<input id="creatinine" placeholder="Creatinine">
<input id="mood_score" placeholder="Mood Score">
<input id="libido_score" placeholder="Libido Score">

<input id="enhancement_load" placeholder="Enhancement Load">

<select id="sex">
  <option value="">Select Sex</option>
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>

<select id="status">
  <option value="">Cycle Status</option>
  <option value="off">Off</option>
  <option value="on">On</option>
  <option value="pct">PCT</option>
  <option value="cruise">Cruise</option>
</select>

<select id="goal">
  <option value="">Goal</option>
  <option value="bulk">Bulk</option>
  <option value="cut">Cut</option>
  <option value="recomp">Recomp</option>
  <option value="maintenance">Maintenance</option>
</select>

</div>

<button onclick="predict()">🚀 Analyze Risk</button>

<div class="card">
  <h2 id="result">Result will appear here</h2>
  <p id="confidence"></p>
  <p class="error" id="error"></p>
</div>

<script>
async function predict() {

  const data = {
    age: Number(age.value),
    weight_kg: Number(weight_kg.value),
    bf_percent: Number(bf_percent.value),
    training_vol_hr_wk: Number(training_vol_hr_wk.value),
    sleep_h: Number(sleep_h.value),
    testosterone_total: Number(testosterone_total.value),
    estradiol: Number(estradiol.value),
    ALT: Number(ALT.value),
    AST: Number(AST.value),
    HDL: Number(HDL.value),
    LDL: Number(LDL.value),
    hematocrit: Number(hematocrit.value),
    creatinine: Number(creatinine.value),
    mood_score: Number(mood_score.value),
    libido_score: Number(libido_score.value),
    enhancement_load: Number(enhancement_load.value),
    sex: sex.value,
    status: status.value,
    goal: goal.value
  };

  error.innerText = "";

  // Validation
  for (let key in data) {
    if (data[key] === "" || Number.isNaN(data[key])) {
      error.innerText = "⚠️ Please fill all fields correctly";
      return;
    }
  }

  try {
    const res = await fetch(window.location.origin + "/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const out = await res.json();

    if (!res.ok) {
      error.innerText = "❌ Invalid input. Check values.";
      console.log(out);
      return;
    }

    let color = "low";
    if (out.prediction.toLowerCase().includes("high")) color = "high";
    else if (out.prediction.toLowerCase().includes("medium")) color = "medium";

    result.innerHTML = `<span class="${color}">Risk: ${out.prediction}</span>`;
    confidence.innerText =
      "Confidence: " + (out.confidence * 100).toFixed(2) + "%";

  } catch (err) {
    error.innerText = "🚨 Server error. Try again.";
    console.log(err);
  }
}
</script>

</body>
</html>
