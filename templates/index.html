<!DOCTYPE html>
<html>
<head>
  <title>Athlete Risk Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 2.5rem;
      color: #38bdf8;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 30px;
      max-width: 1100px;
      margin: auto;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .card {
      margin-top: 30px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .low { color: #22c55e; }
    .medium { color: #facc15; }
    .high { color: #ef4444; }
  </style>
</head>

<body>

<h1>🏃 Athlete Risk Predictor</h1>

<div class="container">

<input id="age" placeholder="Age">
<input id="weight_kg" placeholder="Weight">
<input id="bf_percent" placeholder="Body Fat %">
<input id="training_vol_hr_wk" placeholder="Training Hours">
<input id="sleep_h" placeholder="Sleep Hours">

<input id="testosterone_total" placeholder="Testosterone">
<input id="estradiol" placeholder="Estradiol">
<input id="ALT" placeholder="ALT">
<input id="AST" placeholder="AST">

<input id="HDL" placeholder="HDL">
<input id="LDL" placeholder="LDL">
<input id="hematocrit" placeholder="Hematocrit">
<input id="creatinine" placeholder="Creatinine">

<input id="mood_score" placeholder="Mood">
<input id="libido_score" placeholder="Libido">
<input id="enhancement_load" placeholder="Enhancement Load">

<select id="sex">
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>

<select id="status">
  <option value="off">Off</option>
  <option value="on">On</option>
  <option value="pct">PCT</option>
  <option value="cruise">Cruise</option>
</select>

<select id="goal">
  <option value="bulk">Bulk</option>
  <option value="cut">Cut</option>
  <option value="recomp">Recomp</option>
  <option value="maintenance">Maintenance</option>
</select>

</div>

<button onclick="predict()">🚀 Analyze Risk</button>

<div class="card">
  <h2 id="result">Result will appear here</h2>
  <p id="confidence"></p>
</div>

<script>
async function predict() {

  const data = {
    age: +age.value,
    weight_kg: +weight_kg.value,
    bf_percent: +bf_percent.value,
    training_vol_hr_wk: +training_vol_hr_wk.value,
    sleep_h: +sleep_h.value,
    testosterone_total: +testosterone_total.value,
    estradiol: +estradiol.value,
    ALT: +ALT.value,
    AST: +AST.value,
    HDL: +HDL.value,
    LDL: +LDL.value,
    hematocrit: +hematocrit.value,
    creatinine: +creatinine.value,
    mood_score: +mood_score.value,
    libido_score: +libido_score.value,
    enhancement_load: +enhancement_load.value,
    sex: sex.value,
    status: status.value,
    goal: goal.value
  };

  const res = await fetch("https://enhanced-athlete-risk-predictor.onrender.com/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const out = await res.json();

  document.getElementById("result").innerText =
    "Risk: " + out.prediction +
    " | Confidence: " + (out.confidence * 100).toFixed(2) + "%";
}
</script>

</body>
</html>
